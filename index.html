<!doctype html>
<html lang="ur" dir="rtl" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, proxy-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="-1" />
    <meta http-equiv="Surrogate-Control" content="content='no-store'" />
    <title>صحت مند گھر v5.8.0 (Mobile Optimized)</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
        });
      }
      // Hard refresh for major UX update
      const currentVersion = '5.8.0';
      if (localStorage.getItem('app-version') !== currentVersion) {
        localStorage.clear();
        localStorage.setItem('app-version', currentVersion);
      }
    </script>
  </head>
  <body>
    <div id="root" data-version="5.8.0"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
